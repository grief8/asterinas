name: Test Asterinas on x86 TDX

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # Daily at 22:00 UTC

jobs:
  tdx-test:
    uses: ./.github/workflows/test_backend.yml
    strategy:
      matrix:
        include:
          - test_id: 'boot_user'
            netdev: 'user'
          - test_id: 'boot_smp4_user'
            netdev: 'user'
            smp: 4
          - test_id: 'syscall_user'
            netdev: 'user'
          - test_id: 'syscall_at_exfat_user'
            netdev: 'user'
          - test_id: 'syscall_smp4_user'
            netdev: 'user'
            smp: 4
          - test_id: 'general_user'
            netdev: 'user'
          - test_id: 'general_smp4_user'
            netdev: 'user'
            smp: 4
          - test_id: 'boot_tap'
            netdev: 'tap'
          - test_id: 'boot_smp4_tap'
            netdev: 'tap'
            smp: 4
          - test_id: 'syscall_tap'
            netdev: 'tap'
          - test_id: 'syscall_at_exfat_tap'
            netdev: 'tap'
          - test_id: 'syscall_smp4_tap'
            netdev: 'tap'
            smp: 4
          - test_id: 'general_tap'
            netdev: 'tap'
          - test_id: 'general_smp4_tap'
            netdev: 'tap'
            smp: 4
      fail-fast: false
    with:
      test_id: ${{ matrix.test_id }}
      auto_test: |
        ${{
          startsWith(matrix.test_id, 'boot') && 'boot' ||
          startsWith(matrix.test_id, 'syscall') && 'syscall' ||
          startsWith(matrix.test_id, 'general') && 'test'
        }}
      release: true
      enable_kvm: false
      intel_tdx: true
      smp: ${{ matrix.smp || 1 }}
      netdev: ${{ matrix.netdev }}
      extra_blocklists: ${{ contains(matrix.test_id, 'exfat') && 'blocklists.exfat' || '' }}
      syscall_test_dir: ${{ contains(matrix.test_id, 'at_exfat') && '/exfat' || '/tmp' }}
      boot_protocol: 'linux-efi-handover64'  # Use explicit boot protocol
      runs_on: self-hosted
      timeout_minutes: 30
      integration_image: 'asterinas/asterinas:0.14.0-tdx'
      osdk_images: '["asterinas/asterinas:0.14.0-tdx", "asterinas/osdk:0.14.0-tdx"]'
      run_general_tests: false
