name: Test Asterinas on x86

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  general-check:
    uses: ./.github/workflows/test_backend.yml
    with:
      run_general_tests: true
      integration_image: 'asterinas/asterinas:0.14.0'
      runs_on: 'ubuntu-latest'

  x86-test:
    uses: ./.github/workflows/test_backend.yml
    strategy:
      matrix:
        test_id:
          # Boot
          - 'boot_mb'
          - 'boot_legacy32'
          - 'boot_mb2_smp4'

          # Syscall
          - 'syscall_debug'
          - 'syscall_at_ext2_microvm'
          - 'syscall_at_ext2_iommu_debug'
          - 'syscall_at_exfat_mb2_nokvm'
          - 'syscall_mb2_smp4'

          # General
          - 'test_efi'
          - 'test_mb2_smp4'
      fail-fast: false
    with:
      test_id: ${{ matrix.test_id }}
      auto_test: ${{ startsWith(matrix.test_id, 'boot') && 'boot' ||
          startsWith(matrix.test_id, 'syscall') && 'syscall' ||
          startsWith(matrix.test_id, 'test') && 'test' }}
      release: ${{ !contains(matrix.test_id, '_debug') }}
      enable_kvm: ${{ !contains(matrix.test_id, 'nokvm') }}
      intel_tdx: ${{ contains(matrix.test_id, 'tdx') }}
      smp: ${{ contains(matrix.test_id, 'smp4') && 4 || contains(matrix.test_id, 'smp') && 2 || 1 }}
      netdev: 'tap'
      scheme: ${{ contains(matrix.test_id, 'microvm') && 'microvm' || contains(matrix.test_id, 'iommu') && 'iommu' || 'none' }}
      extra_blocklists: ${{ contains(matrix.test_id, 'exfat') && 'blocklists.exfat' || '' }}
      syscall_test_dir: ${{ contains(matrix.test_id, 'at_ext2') && '/ext2' || contains(matrix.test_id, 'at_exfat') && '/exfat' || '/tmp' }}
      boot_protocol: |
        ${{
          startsWith(matrix.test_id, 'boot_mb2') && 'multiboot2' ||
          startsWith(matrix.test_id, 'boot_mb') && 'multiboot' ||
          startsWith(matrix.test_id, 'boot_legacy32') && 'linux-legacy32' ||
          'linux-efi-handover64'
        }}
      integration_image: 'asterinas/asterinas:0.14.0'
      osdk_images: '["asterinas/asterinas:0.14.0", "asterinas/osdk:0.14.0"]'
      runs_on: 'ubuntu-latest'
      run_general_tests: false
